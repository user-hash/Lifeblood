name: CI (Windows complement)

# Windows-only complement to build.yml. build.yml covers ubuntu C# build/test
# + TypeScript adapter + Python adapter + dogfood + pack. This workflow only
# adds windows-latest C# build/test coverage so the matrix stays honest
# without duplicating every adapter/dogfood/pack job on both runners.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build --configuration Release
      - run: dotnet restore tests/GoldenRepos/WriteSideApp/WriteSideApp.sln
      - run: dotnet test --configuration Release --verbosity normal
