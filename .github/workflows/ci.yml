name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build --configuration Release
      # Restore golden repo so WriteSideIntegrationTests can analyze it
      - run: dotnet restore tests/GoldenRepos/WriteSideApp/WriteSideApp.sln
      - run: dotnet test --configuration Release --verbosity normal

  typescript-adapter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: node dist/index.js test-fixtures/mini-app

  python-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m lifeblood_python test-fixtures/mini-app
        working-directory: adapters/python

  dogfood:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build
      - run: dotnet run --project src/Lifeblood.CLI -- analyze --project . --rules lifeblood
