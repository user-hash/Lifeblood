name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test --no-build --configuration Release --verbosity normal
      - name: Pack dotnet tools
        run: |
          dotnet pack src/Lifeblood.CLI/Lifeblood.CLI.csproj --no-build --configuration Release --output ./artifacts
          dotnet pack src/Lifeblood.Server.Mcp/Lifeblood.Server.Mcp.csproj --no-build --configuration Release --output ./artifacts
      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30

  typescript-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build TypeScript adapter
        working-directory: adapters/typescript
        run: npm install && npm run build
      - name: Self-analysis (TS adapter analyzes itself)
        working-directory: adapters/typescript
        run: node dist/index.js . > ts-self-graph.json
      - name: Validate self-analysis graph
        working-directory: adapters/typescript
        run: |
          node -e "
            const d = require('./ts-self-graph.json');
            const ids = new Set(d.symbols.map(s => s.id));
            const dangling = d.edges.filter(e => !ids.has(e.sourceId) || !ids.has(e.targetId));
            if (dangling.length > 0) { console.error('Dangling edges:', dangling.length); process.exit(1); }
            if (!d.version || !d.language || !d.adapter) { console.error('Missing metadata'); process.exit(1); }
            console.log('Self-analysis — Symbols:', d.symbols.length, 'Edges:', d.edges.length, 'Clean.');
          "
      - name: Golden repo test (mini-app)
        working-directory: adapters/typescript
        run: |
          node dist/index.js test-fixtures/mini-app > mini-app-graph.json
          node -e "
            const d = require('./mini-app-graph.json');
            const ids = new Set(d.symbols.map(s => s.id));
            const types = d.symbols.filter(s => s.kind === 'type');
            const methods = d.symbols.filter(s => s.kind === 'method');
            const refs = d.edges.filter(e => e.kind === 'references');
            const errors = [];
            if (types.length < 3) errors.push('Expected >= 3 types, got ' + types.length);
            if (methods.length < 2) errors.push('Expected >= 2 methods, got ' + methods.length);
            if (refs.length < 2) errors.push('Expected >= 2 reference edges, got ' + refs.length);
            if (!types.find(t => t.id.includes('Entity'))) errors.push('Missing Entity type');
            if (!types.find(t => t.id.includes('IRepository'))) errors.push('Missing IRepository type');
            if (!types.find(t => t.id.includes('UserService'))) errors.push('Missing UserService type');
            if (!refs.find(e => e.sourceId.includes('UserService') && e.targetId.includes('IRepository'))) errors.push('Missing UserService -> IRepository edge');
            const dangling = d.edges.filter(e => !ids.has(e.sourceId) || !ids.has(e.targetId));
            if (dangling.length > 0) errors.push('Dangling edges: ' + dangling.length);
            if (errors.length > 0) { errors.forEach(e => console.error(e)); process.exit(1); }
            console.log('Golden repo — Types:', types.length, 'Methods:', methods.length, 'Refs:', refs.length, 'PASS');
          "

  python-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Self-analysis (Python adapter analyzes itself)
        working-directory: adapters/python
        run: python -m lifeblood_python . > py-self-graph.json
      - name: Validate self-analysis graph
        working-directory: adapters/python
        run: |
          python -c "
          import json, sys
          d = json.load(open('py-self-graph.json'))
          ids = set(s['id'] for s in d['symbols'])
          dangling = [e for e in d['edges'] if e['sourceId'] not in ids or e['targetId'] not in ids]
          if dangling:
              print(f'Dangling edges: {len(dangling)}', file=sys.stderr)
              sys.exit(1)
          if not d.get('version') or not d.get('language') or not d.get('adapter'):
              print('Missing metadata', file=sys.stderr)
              sys.exit(1)
          print(f'Self-analysis — Symbols: {len(d[\"symbols\"])} Edges: {len(d[\"edges\"])} Clean.')
          "
      - name: Golden repo test (mini-app)
        working-directory: adapters/python
        run: |
          python -m lifeblood_python test-fixtures/mini-app > mini-app-graph.json
          python -c "
          import json, sys
          d = json.load(open('mini-app-graph.json'))
          ids = set(s['id'] for s in d['symbols'])
          types = [s for s in d['symbols'] if s['kind'] == 'type']
          methods = [s for s in d['symbols'] if s['kind'] == 'method']
          refs = [e for e in d['edges'] if e['kind'] == 'references']
          errors = []
          if len(types) < 3: errors.append(f'Expected >= 3 types, got {len(types)}')
          if len(methods) < 2: errors.append(f'Expected >= 2 methods, got {len(methods)}')
          if len(refs) < 2: errors.append(f'Expected >= 2 reference edges, got {len(refs)}')
          if not any('Entity' in t['id'] for t in types): errors.append('Missing Entity type')
          if not any('IRepository' in t['id'] for t in types): errors.append('Missing IRepository type')
          if not any('UserService' in t['id'] for t in types): errors.append('Missing UserService type')
          if not any('UserService' in e['sourceId'] and 'IRepository' in e['targetId'] for e in refs): errors.append('Missing UserService -> IRepository edge')
          dangling = [e for e in d['edges'] if e['sourceId'] not in ids or e['targetId'] not in ids]
          if dangling: errors.append(f'Dangling edges: {len(dangling)}')
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          print(f'Golden repo — Types: {len(types)} Methods: {len(methods)} Refs: {len(refs)} PASS')
          "

  dogfood:
    runs-on: ubuntu-latest
    needs: [build, typescript-adapter, python-adapter]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: dotnet build --configuration Release --verbosity quiet

      - name: C# self-analysis with rules
        run: dotnet run --project src/Lifeblood.CLI --configuration Release -- analyze --project . --rules packs/lifeblood/rules.json

      - name: Generate context pack
        run: dotnet run --project src/Lifeblood.CLI --configuration Release -- context --project . > context-pack.json

      - name: Export C# semantic graph
        run: dotnet run --project src/Lifeblood.CLI --configuration Release -- export --project . > graph-csharp.json

      - name: TypeScript cross-language proof
        run: |
          cd adapters/typescript && npm install && npm run build
          node dist/index.js . > ../../graph-typescript.json
          cd ../..
          dotnet run --project src/Lifeblood.CLI --configuration Release -- analyze --graph graph-typescript.json

      - name: Python cross-language proof
        run: |
          cd adapters/python
          python -m lifeblood_python . > ../../graph-python.json
          cd ../..
          dotnet run --project src/Lifeblood.CLI --configuration Release -- analyze --graph graph-python.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lifeblood-dogfood
          path: |
            context-pack.json
            graph-csharp.json
            graph-typescript.json
            graph-python.json
          retention-days: 30
