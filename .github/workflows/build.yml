name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test --no-build --configuration Release --verbosity normal

  dogfood:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build --configuration Release --verbosity quiet

      - name: Self-analysis with rules
        run: dotnet run --project src/Lifeblood.CLI --configuration Release -- analyze --project . --rules packs/lifeblood/rules.json

      - name: Generate context pack
        run: dotnet run --project src/Lifeblood.CLI --configuration Release -- context --project . > context-pack.json

      - name: Export semantic graph
        run: dotnet run --project src/Lifeblood.CLI --configuration Release -- export --project . > graph.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lifeblood-dogfood
          path: |
            context-pack.json
            graph.json
          retention-days: 30
