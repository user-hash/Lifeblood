name: Release Verification

# Strict trigger: only pure triple-dot semver tags (v1.2.3).
# Helper tags like v0.6.4.1-post-extractor or v0.7.0-rc1 must NOT fire this
# workflow — Directory.Build.props uses MinVer, so the git tag becomes the
# NuGet package version, and an accidental helper-tag run produces garbage
# artifacts. Pre-release and hotfix verifications must go through
# workflow_dispatch (manual) so the operator consciously opts in.
#
# NOTE: on a pure-semver TAG push this workflow verifies (build + test + dogfood
# + semver guard), packs, and publishes to NuGet via Trusted Publishing — no
# stored API key. `NuGet/login` exchanges the job's OIDC id-token for a
# short-lived key (requires `id-token: write` + a NuGet Trusted Publisher policy
# matching this repo + workflow file). No long-lived publish secret lives in
# GitHub, which is the canonical supply-chain attack surface. The push runs only
# for tag pushes; workflow_dispatch stays verify-only. The packed .nupkg are
# still uploaded as artifacts for inspection / audit.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "verify" to confirm manual release verification'
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC token for NuGet Trusted Publishing (NuGet/login)
    steps:
      - name: Guard — refuse manual run without explicit confirmation
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'verify'
        run: |
          echo "Manual verify requires confirm=verify. Aborting."
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full history to derive version from tag

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - run: dotnet restore

      - run: dotnet build --no-restore --configuration Release

      # Restore golden repo so WriteSideIntegrationTests can analyze it
      - run: dotnet restore tests/GoldenRepos/WriteSideApp/WriteSideApp.sln

      - run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Dogfood — self-analysis with built-in rules
        run: dotnet run --project src/Lifeblood.CLI --no-build --configuration Release -- analyze --project . --rules lifeblood

      - name: Verify — full vs incremental edge integrity (INV-INCREMENTAL-XREF-001)
        run: dotnet run --project src/Lifeblood.CLI --no-build --configuration Release -- verify --incremental --project .

      - name: Pack CLI tool
        run: dotnet pack src/Lifeblood.CLI/Lifeblood.CLI.csproj --no-build --configuration Release --output ./artifacts

      - name: Pack MCP server tool
        run: dotnet pack src/Lifeblood.Server.Mcp/Lifeblood.Server.Mcp.csproj --no-build --configuration Release --output ./artifacts

      - name: Guard — tag-triggered runs must produce pure semver artifacts
        # Belt-and-braces. The tag filter above already refuses suffixed tags,
        # but MinVer could still produce a prerelease suffix (e.g., if someone
        # force-moves a tag or the dispatch path is abused). If we're here via
        # a tag push, every nupkg filename must be plain X.Y.Z with no hyphen.
        if: github.event_name == 'push'
        run: |
          set -e
          for f in ./artifacts/*.nupkg; do
            name=$(basename "$f")
            if echo "$name" | grep -qE -- '-(alpha|beta|rc|preview|dev|post)'; then
              echo "REFUSED: $name has a prerelease suffix but this run was triggered by a tag push." >&2
              echo "Tag-triggered runs must produce pure semver artifacts." >&2
              exit 1
            fi
          done
          echo "Pack guard passed — all artifacts are pure semver."

      - name: NuGet trusted-publish login (OIDC -> short-lived key)
        if: github.event_name == 'push'
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push packages to NuGet
        if: github.event_name == 'push'
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload .nupkg artifacts (for inspection / audit)
        uses: actions/upload-artifact@v4
        with:
          name: lifeblood-${{ github.ref_name }}-nupkg
          path: ./artifacts/*.nupkg
          retention-days: 90
