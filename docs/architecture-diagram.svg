  <text x="550" y="200" text-anchor="middle" fill="#7bdcff" font-size="11" font-weight="bold">DOMAIN</text>
  <text x="550" y="218" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Semantic Graph</text>
  <text x="550" y="236" text-anchor="middle" fill="#8b949e" font-size="9">Symbol  Edge  Evidence</text>
  <text x="550" y="252" text-anchor="middle" fill="#8b949e" font-size="9">GraphBuilder  GraphValidator</text>
  <text x="550" y="268" text-anchor="middle" fill="#8b949e" font-size="9">GraphDocument  Immutable</text>

  <!-- RIGHT PORTS -->
  <rect x="670" y="135" width="152" height="44" rx="8" fill="#1f1a33" stroke="#a88bff" stroke-width="1.5" />
  <text x="746" y="153" text-anchor="middle" fill="#a88bff" font-size="10" font-weight="bold">IAgentContextGenerator</text>
