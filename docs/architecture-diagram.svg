  <line x1="260" y1="155" x2="288" y2="155" stroke="#6ba3d6" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="260" y1="215" x2="288" y2="215" stroke="#6ba3d6" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="430" y1="157" x2="450" y2="175" stroke="#6ba3d6" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="430" y1="219" x2="450" y2="215" stroke="#6ba3d6" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="650" y1="175" x2="668" y2="157" stroke="#a88bff" stroke-width="1.5" marker-end="url(#arrowR)" />
  <line x1="650" y1="215" x2="668" y2="219" stroke="#a88bff" stroke-width="1.5" marker-end="url(#arrowR)" />
  <line x1="822" y1="155" x2="838" y2="155" stroke="#a88bff" stroke-width="2" marker-end="url(#arrowR)" />
  <line x1="822" y1="215" x2="838" y2="215" stroke="#a88bff" stroke-width="2" marker-end="url(#arrowR)" />
  <line x1="822" y1="215" x2="838" y2="260" stroke="#a88bff" stroke-width="1.5" marker-end="url(#arrowR)" />
  <line x1="822" y1="215" x2="838" y2="312" stroke="#a88bff" stroke-width="1.5" marker-end="url(#arrowR)" />

  <!-- ANALYSIS -->
  <rect x="370" y="410" width="360" height="58" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="550" y="432" text-anchor="middle" fill="#8cf0b5" font-size="11" font-weight="bold">Lifeblood.Analysis</text>
  <text x="550" y="448" text-anchor="middle" fill="#8b949e" font-size="10">CouplingAnalyzer  BlastRadiusAnalyzer  CircularDependencyDetector</text>
  <text x="550" y="460" text-anchor="middle" fill="#8b949e" font-size="10">TierClassifier  RuleValidator</text>
  <line x1="550" y1="380" x2="550" y2="408" stroke="#8cf0b5" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- CLI -->
  <rect x="370" y="490" width="360" height="48" rx="10" fill="#161b22" stroke="#ffd37b" stroke-width="1.5" />
  <text x="550" y="510" text-anchor="middle" fill="#ffd37b" font-size="11" font-weight="bold">Lifeblood.CLI + Server.Mcp</text>
  <text x="550" y="528" text-anchor="middle" fill="#8b949e" font-size="10">analyze | context | export | 6 MCP tools over stdio</text>

  <!-- INVARIANTS -->
  <rect x="130" y="570" width="840" height="70" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1" />
  <text x="550" y="592" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Enforced Invariants</text>
  <text x="550" y="610" text-anchor="middle" fill="#8b949e" font-size="10">Domain: zero deps  |  Adapters never ref adapters  |  Connectors never ref adapters  |  Graph immutable</text>
  <text x="550" y="626" text-anchor="middle" fill="#8b949e" font-size="10">Output deterministic  |  11 frozen ADRs  |  82 tests  |  3 CI jobs (build + TS adapter + dogfood)</text>
