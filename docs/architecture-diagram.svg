<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6ba3d6" />
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a88bff" />
    </marker>
  </defs>

  <rect width="1100" height="660" rx="16" fill="#0d1117" />

  <text x="550" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">Lifeblood — Hexagonal Architecture</text>
  <text x="550" y="56" text-anchor="middle" fill="#8b949e" font-size="12">Solid = implemented. Dashed = planned. 594 symbols, 830 edges, 82 tests, CI green.</text>

  <!-- LEFT LABEL -->
  <text x="145" y="88" text-anchor="middle" fill="#6ba3d6" font-size="11" font-weight="bold" letter-spacing="1">LEFT SIDE</text>
  <text x="145" y="102" text-anchor="middle" fill="#8b949e" font-size="10">Language Adapters</text>

  <!-- LEFT: Implemented -->
  <rect x="30" y="118" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="145" y="138" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">Roslyn / C#</text>
  <text x="145" y="155" text-anchor="middle" fill="#8b949e" font-size="10">Reference adapter. Proven confidence.</text>

  <rect x="30" y="176" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="145" y="196" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">TypeScript</text>
  <text x="145" y="213" text-anchor="middle" fill="#8b949e" font-size="10">Standalone Node.js. High confidence.</text>

  <rect x="30" y="234" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="145" y="254" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">JSON Graph Import</text>
  <text x="145" y="271" text-anchor="middle" fill="#8b949e" font-size="10">Universal protocol. Any language.</text>

  <!-- LEFT: Planned -->
  <rect x="30" y="298" width="230" height="38" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4" />
  <text x="145" y="322" text-anchor="middle" fill="#8b949e" font-size="11">Go / Python / Rust (planned)</text>

  <!-- LEFT PORTS -->
  <rect x="290" y="135" width="140" height="44" rx="8" fill="#1a2233" stroke="#6ba3d6" stroke-width="1.5" />
  <text x="360" y="153" text-anchor="middle" fill="#6ba3d6" font-size="10" font-weight="bold">IWorkspaceAnalyzer</text>
  <text x="360" y="168" text-anchor="middle" fill="#8b949e" font-size="9">project -&gt; graph</text>

  <rect x="290" y="197" width="140" height="44" rx="8" fill="#1a2233" stroke="#6ba3d6" stroke-width="1.5" />
  <text x="360" y="215" text-anchor="middle" fill="#6ba3d6" font-size="10" font-weight="bold">IGraphImporter</text>
  <text x="360" y="230" text-anchor="middle" fill="#8b949e" font-size="9">JSON -&gt; GraphDocument</text>

  <!-- HEXAGONAL CORE -->
  <polygon points="550,80 730,140 730,320 550,380 370,320 370,140" fill="#131d2e" stroke="#30363d" stroke-width="2" />
  <text x="550" y="114" text-anchor="middle" fill="#6ba3d6" font-size="10" font-weight="bold" letter-spacing="1">APPLICATION</text>
  <text x="460" y="168" text-anchor="middle" fill="#8b949e" font-size="9">Ports</text>
  <text x="640" y="168" text-anchor="middle" fill="#8b949e" font-size="9">Use Cases</text>

