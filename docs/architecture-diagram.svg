  <rect x="670" y="197" width="152" height="44" rx="8" fill="#1f1a33" stroke="#a88bff" stroke-width="1.5" />
  <text x="746" y="215" text-anchor="middle" fill="#a88bff" font-size="10" font-weight="bold">IMcpGraphProvider</text>
  <text x="746" y="230" text-anchor="middle" fill="#8b949e" font-size="9">queries + blast radius</text>

  <!-- RIGHT LABEL -->
  <text x="955" y="88" text-anchor="middle" fill="#a88bff" font-size="11" font-weight="bold" letter-spacing="1">RIGHT SIDE</text>
  <text x="955" y="102" text-anchor="middle" fill="#8b949e" font-size="10">AI Connectors</text>

  <!-- RIGHT: Implemented -->
  <rect x="840" y="118" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="955" y="138" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">AgentContextGenerator</text>
  <text x="955" y="155" text-anchor="middle" fill="#8b949e" font-size="10">Structured JSON context pack</text>

  <rect x="840" y="176" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="955" y="196" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">InstructionFileGenerator</text>
  <text x="955" y="213" text-anchor="middle" fill="#8b949e" font-size="10">CLAUDE.md / AGENTS.md sections</text>

  <rect x="840" y="234" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="955" y="254" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">MCP Server (stdio)</text>
  <text x="955" y="271" text-anchor="middle" fill="#8b949e" font-size="10">6 tools. JSON-RPC 2.0.</text>

  <rect x="840" y="292" width="230" height="48" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
  <text x="955" y="312" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">LifebloodMcpProvider</text>
  <text x="955" y="329" text-anchor="middle" fill="#8b949e" font-size="10">Lookup, deps, blast radius</text>

  <!-- RIGHT: Planned -->
  <rect x="840" y="356" width="230" height="38" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4" />
  <text x="955" y="380" text-anchor="middle" fill="#8b949e" font-size="11">REST / LSP Bridge (planned)</text>

